<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tic-Tac-Toe</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#1d1b2f;
color:#fff;
}
.container{text-align:center}
h1{margin-bottom:20px}
#status{margin:15px;font-size:20px}
.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
}
.cell{
width:100px;
height:100px;
background:#2f3154;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
cursor:pointer;
border-radius:10px;
transition:.3s;
}
.cell:hover{background:#00c8ff;color:#111}
button{
margin-top:20px;
padding:10px 25px;
border:none;
border-radius:30px;
background:#00c8ff;
cursor:pointer;
font-size:16px;
font-weight:bold;
}
button:hover{opacity:.9}
</style>
</head>

<body>

<div class="container">

<h1>❌ Tic-Tac-Toe ⭕</h1>

<div id="status">Player X Turn</div>

<div class="board" id="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<button onclick="resetGame()">Restart</button>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const status=document.getElementById("status");

let current="X";
let game=true;
let board=["","","","","","","","",""];

const win=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

cells.forEach((cell,i)=>{

cell.onclick=()=>{

if(board[i]||!game)return;

board[i]=current;
cell.textContent=current;

if(checkWin()){
status.textContent=`Player ${current} Wins 🎉`;
game=false;
return;
}

if(!board.includes("")){
status.textContent="Match Draw 🤝";
game=false;
return;
}

current=current=="X"?"O":"X";
status.textContent=`Player ${current} Turn`;

};

});

function checkWin(){

return win.some(c=>{
return c.every(i=>board[i]==current);
});

}

function resetGame(){

board=["","","","","","","","",""];
cells.forEach(c=>c.textContent="");
current="X";
game=true;
status.textContent="Player X Turn";

}

</script>

</body>
</html>
